
dependencies:
  flutter:
    sdk: flutter

  app_settings: ^6.1.1 # 打开/跳转系统设置页面（如权限、电池优化、WiFi、通知等）

  auto_size_text: ^3.0.0 # 文本根据容器大小自动缩放，防止文字溢出

  carousel_slider: ^5.1.1 # 轮播图组件（Banner、图片滑动等）

  computed: ^0.5.1 # 提供类似 Vue computed 的计算属性能力

  connectivity_plus: 6.0.5 # 网络连接状态检测（WiFi / 移动网络 / 无网络）

  date_format: ^2.0.9 # 日期格式化工具（轻量级）

  dio: ^5.8.0+1 # 网络请求库，支持拦截器、取消请求、文件上传下载等

  dotted_border: ^3.1.0 # 给任意 Widget 添加虚线/点线边框

  easy_refresh: ^3.4.0 # 下拉刷新 & 上拉加载更多（替代 RefreshIndicator）

  file_picker: ^10.3.2 # 文件选择器（本地文件、图片、视频、文档等）

  fluttertoast: 8.2.10 # Toast 轻提示（Android / iOS 通用）

  flutter_local_notifications: ^19.5.0 # 本地通知（定时通知、推送提醒）

  flutter_localizations:
    sdk: flutter # Flutter 官方国际化支持（配合 intl 使用）

  flutter_pickers: ^2.1.9 # 多种选择器组件（日期、时间、地址、列表等）

  flutter_riverpod: ^3.0.3 # 状态管理库（类似 Vuex / Pinia，Provider 的进化版）

  flutter_screenutil: ^5.9.3 # 屏幕适配工具（不同尺寸/分辨率适配）

  flutter_svg: ^2.2.0 # 加载并渲染 SVG 图片资源

  fluwx: 5.7.2 # 微信 SDK 封装（登录、分享、支付等）

  image_picker: ^1.2.0 # 从相册或相机选择图片/视频

  intl: any # 国际化与本地化（时间、数字、货币、多语言）

  json_annotation: ^4.9.0 # JSON 序列化注解（配合 json_serializable）

  logger: ^2.4.0 # 日志打印工具（分级日志、格式化输出）

  marquee: ^2.3.0 # 跑马灯文字（横向/纵向滚动文本）

  meta: ^1.16.0 # Dart 元注解（@immutable、@required 等）

  mime: ^2.0.0 # 根据文件名/字节识别 MIME 类型

  permission_handler: ^12.0.1 # 权限申请与检测（相机、相册、定位、通知等）

  qs_dart: ^1.3.8 # QueryString 解析与构建（URL 参数处理）

  retrofit: ^4.4.0 # 基于 Dio 的网络请求封装（接口声明式写法，类似前端 Axios + Retrofit）

  riverpod_annotation: ^3.0.3 # Riverpod 注解支持（配合代码生成）

  shake: ^3.0.0 # 摇一摇触发事件（常用于调试工具，如 vConsole）

  shared_preferences: ^2.5.3 # 本地轻量存储（key-value，类似 localStorage）

  shelf: ^1.4.2 # Dart HTTP 服务框架（可用于内置本地服务器）

  shelf_static: ^1.1.3 # shelf 静态资源服务（本地文件、HTML、调试页）

  signals: ^6.0.2 # 响应式状态管理（signals 模式，类似 Solid.js）

  sqflite: ^2.4.2 # SQLite 数据库存储（本地结构化数据）

  swagger_parser: ^1.30.0 # 解析 Swagger/OpenAPI 文档并生成 Dart API 代码

  talker_dio_logger: ^4.9.3 # Dio 请求日志插件（配合 Talker）

  talker_flutter: ^4.8.3 # 调试与日志可视化工具（控制台 / Overlay）

  url_launcher: ^6.3.2 # 打开外部链接（浏览器、电话、邮件、地图）

  video_player: ^2.10.0 # 视频播放组件（本地 / 网络视频）

  webview_flutter: ^4.13.0 # WebView 容器（加载 H5 页面）

  go_router: ^16.3.0 # 官方推荐路由方案（声明式路由、嵌套路由、重定向）