name: flutter_application
description: "flutter学习过程记录"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  fluttertoast: ^9.0.0
  photo_view: ^0.15.0
  json_annotation: ^4.9.0 #json 格式化用的
  path_provider: ^2.1.0 # 官方插件, 用来获取合法的、可写的目录路径
  auto_route: ^10.2.3 # 路由插件
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3 # riverpod的注解插件
  shared_preferences: ^2.5.3 #类似于本地存储
  logging: ^1.2.0 # 日志库
  dio: ^5.9.0 
  connectivity_plus: ^7.0.0 # 网络检测插件
  flutter_hooks: 
  hooks_riverpod: ^3.0.3
  webview_flutter: ^4.13.0
  uuid: ^4.5.2
  easy_refresh: ^3.4.0 # 下拉刷新插件
  permission_handler: ^11.3.1 # 权限管理插件
  photo_manager: ^3.1.0 # 相册管理插件
  flutter_local_notifications: ^17.0.0 # 通知插件
  image_picker: ^1.1.2 # 选取图片
  video_player: ^2.9.1 # 视频播放器
  animated_text_kit: ^4.3.0 # 打字动画
  pdfrx: ^2.2.20 # PDF 渲染插件
  easy_image_viewer: ^1.5.1 # 图片预览插件
  image_gallery_saver: ^2.0.3 # 保存图片到相册
  url_launcher: ^6.3.1 # URL 启动器，用于打开浏览器、打电话等
  flutter_staggered_grid_view: ^0.7.0 # 瀑布流布局插件
  intl: ^0.20.2 # 国际化插件
  flutter_html: ^3.0.0 # HTML 富文本渲染插件
  flutter_highlight: ^0.7.0 # 代码高亮 (用于富文本中的 pre/code)
  # better_player_enhanced: ^0.0.5 # 视频播放器插件 (由于 CocoaPods 依赖问题，改用 video_player)
  # video_player 已在依赖中，无需重复添加

dev_dependencies:
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.5 # 自动生成 JSON 序列化/反序列化代码的插件, 一般配合 json_annotation 使用
  flutter_launcher_icons: ^0.14.4 # app图标替换插件, 使用方式: dart run flutter_launcher_icons
  auto_route_generator: ^10.2.6 # 路由注解插件
  riverpod_generator: ^3.0.3 # riverpod的注解插件
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3
  build_runner: 
  flutter_lints: ^6.0.0

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - images/Friday-basketball-poster.jpg
    - assets/images/kk-mirror.jpeg
    - assets/images/astronaut.png
    - assets/images/profil.old.jpg
    - assets/images/profil.young.jpg
    - assets/images/pic_1.jpg
    - assets/images/pic_2.jpg
    - assets/images/pic_3.jpg
    - assets/images/pic_4.jpg
    - assets/images/pic_5.jpg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: IconFont
      fonts:
        - asset: assets/icons/iconfont.ttf
    - family: kkIcon
      fonts:
        - asset: fonts/iconfont.ttf
  #     - asset: fonts/Schyler-Italic.ttf
  #       style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

analyzer:
  plugins:
    - riverpod_lint

plugins:
  riverpod_lint: ^3.0.3